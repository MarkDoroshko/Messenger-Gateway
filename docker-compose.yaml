services:
  # ==========================================
  # Gateway (Nginx)
  # ==========================================
  gateway:
    image: nginx:alpine
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - messenger-net

  # ==========================================
  # Auth Service (Go)
  # ==========================================
  auth-service:
    build:
      context: ../Messenger-Auth-Service
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      PORT: ${AUTH_PORT}
      HOST: ${AUTH_HOST}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      SERVER_TIMEOUT: ${SERVER_TIMEOUT}
      DB_TIMEOUT: ${DB_TIMEOUT}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      INTERNAL_SERVICE_USERNAME: ${INTERNAL_SERVICE_USERNAME}
      INTERNAL_SERVICE_PASSWORD: ${INTERNAL_SERVICE_PASSWORD}
      POSTGRES_HOST: ${AUTH_POSTGRES_HOST}
      POSTGRES_PORT: ${AUTH_POSTGRES_PORT}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USE_SSL: ${AUTH_POSTGRES_USE_SSL}
    depends_on:
      db-auth:
        condition: service_healthy
    networks:
      - messenger-net

  # ==========================================
  # User Service (Java / Spring Boot)
  # ==========================================
  user-service:
    build:
      context: ../../IdeaProjects/Messenger-User-Service
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      SERVER_PORT: ${USER_SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${USER_POSTGRES_HOST}:${USER_POSTGRES_PORT}/${USER_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${USER_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${USER_POSTGRES_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      INTERNAL_SERVICE_USERNAME: ${INTERNAL_SERVICE_USERNAME}
      INTERNAL_SERVICE_PASSWORD: ${INTERNAL_SERVICE_PASSWORD}
    depends_on:
      db-user:
        condition: service_healthy
    networks:
      - messenger-net

  # ==========================================
  # Auth Database (PostgreSQL)
  # ==========================================
  db-auth:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
    volumes:
      - db-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - messenger-net

  # ==========================================
  # User Database (PostgreSQL)
  # ==========================================
  db-user:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USER_POSTGRES_DB}
    volumes:
      - db-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER} -d ${USER_POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - messenger-net

volumes:
  db-auth-data:
  db-user-data:

networks:
  messenger-net:
    driver: bridge
